kind = "web"
previewPath = "/"
title = "AI Dashboard"
version = "1.0.0"
id = "artifacts/brutalist-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20528

[services.development]
run = "pnpm --filter @workspace/retro-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/retro-ai", "run", "build" ]
publicDir = "artifacts/retro-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20528"
BASE_PATH = "/"
